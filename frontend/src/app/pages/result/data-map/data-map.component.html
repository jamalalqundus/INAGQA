<div class="map-container" fxLayout fxLayout="row" fxLayout.xs="column">
    <div id="map" class="map" fxFlex="70"></div>
    <div class="table-wrapper" fxFlex="30">
        <table mat-table [dataSource]="data" class="location-table">
            <ng-container matColumnDef="Location">
                <th mat-header-cell *matHeaderCellDef class="title"> Adressen </th>
                <td mat-cell *matCellDef="let element; let i = index" (click)="highlightMarker(i)" [ngClass]="highlighted == i ? 'selected' : ''">{{ element.locationlabel }}</td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>  
    </div>  
</div>
